<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body { width:220px; font-family:'Outfit',sans-serif; background:#0d0d14; color:#e8e8f0; margin:0; padding:16px; }
  .logo { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .logo svg { width:32px; height:32px; border-radius:8px; }
  .logo h1 { font-size:16px; font-weight:800; margin:0; }
  .logo p  { font-size:10px; color:#9898b0; margin:0; }
  button { width:100%; padding:9px; background:linear-gradient(135deg,#6C63FF,#FF6B9D); border:none; border-radius:8px; color:white; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:8px; font-family:'Outfit',sans-serif; }
  button:hover { opacity:0.9; }
  .sec { background:#1e1e2e; border-radius:8px; padding:10px; margin-bottom:8px; }
  .sec h3 { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#5a5a70; margin:0 0 8px; }
  .row { display:flex; justify-content:space-between; font-size:12px; color:#9898b0; margin-bottom:4px; }
  .row span:last-child { color:#e8e8f0; font-weight:600; }
  .shortcut { background:#13131e; border-radius:6px; padding:6px 10px; font-size:11px; color:#9898b0; display:flex; justify-content:space-between; margin-bottom:4px; }
  .shortcut kbd { background:#252538; padding:2px 6px; border-radius:4px; font-size:10px; color:#6C63FF; }
  a { color:#6C63FF; font-size:11px; text-decoration:none; display:block; text-align:center; margin-top:8px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="logo">
  <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#g)"/><path d="M8 10h6l4 12 4-12h6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="16" cy="22" r="2" fill="white"/><defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6C63FF"/><stop offset="1" stop-color="#FF6B9D"/></linearGradient></defs></svg>
  <div><h1>Nexus</h1><p id="brandSub">Productivity Sidebar</p></div>
</div>

<button id="openBtn" id="openBtn">⚡ Open Sidebar</button>

<div class="sec" id="statsBox">
  <h3 id="todayTitle">Today</h3>
  <div class="row"><span id="tasksLabel">Tasks remaining</span><span id="pTasks">–</span></div>
  <div class="row"><span id="habitsLabel">Habits done</span><span id="pHabits">–</span></div>
  <div class="row"><span id="focusLabel">Focus time</span><span id="pFocus">–</span></div>
</div>

<div class="sec">
  <h3 id="shortcutsTitle">Shortcuts</h3>
  <div class="shortcut"><span id="scOpen">Open Sidebar</span> <kbd>Ctrl+Shift+S</kbd></div>
  <div class="shortcut"><span id="scTodo">Todo</span> <kbd>Ctrl+Shift+T</kbd></div>
  <div class="shortcut"><span id="scNotes">Notes</span> <kbd>Ctrl+Shift+N</kbd></div>
  <div class="shortcut"><span id="scFocus">Focus</span> <kbd>Ctrl+Shift+P</kbd></div>
</div>

<a href="sidebar/sidebar.html" target="_blank" id="openTabLink">Open in full tab ↗</a>

<script>

const I18N={en:{brandSub:'Productivity Sidebar',openSidebar:'⚡ Open Sidebar',today:'Today',tasks:'Tasks remaining',habits:'Habits done',focus:'Focus time',shortcuts:'Shortcuts',todo:'Todo',notes:'Notes',focusShort:'Focus',openTab:'Open in full tab ↗'},'zh-CN':{brandSub:'效率侧边栏',openSidebar:'⚡ 打开侧边栏',today:'今日',tasks:'剩余任务',habits:'习惯完成',focus:'专注时长',shortcuts:'快捷键',todo:'待办',notes:'笔记',focusShort:'专注',openTab:'在完整标签页打开 ↗'}};
function tr(lang,key){return I18N[lang]?.[key]||I18N.en[key]||key}
function applyLocale(lang){document.getElementById('brandSub').textContent=tr(lang,'brandSub');document.getElementById('openBtn').textContent=tr(lang,'openSidebar');document.getElementById('todayTitle').textContent=tr(lang,'today');document.getElementById('tasksLabel').textContent=tr(lang,'tasks');document.getElementById('habitsLabel').textContent=tr(lang,'habits');document.getElementById('focusLabel').textContent=tr(lang,'focus');document.getElementById('shortcutsTitle').textContent=tr(lang,'shortcuts');document.getElementById('scOpen').textContent=tr(lang,'openSidebar').replace('⚡ ','');document.getElementById('scTodo').textContent=tr(lang,'todo');document.getElementById('scNotes').textContent=tr(lang,'notes');document.getElementById('scFocus').textContent=tr(lang,'focusShort');document.getElementById('openTabLink').textContent=tr(lang,'openTab');}

chrome.storage.local.get('nexusSettings', d => {
  const lang = d.nexusSettings?.language || 'en';
  applyLocale(lang);
  if (!d.nexusSettings?.onboardingCompleted) {
    chrome.tabs.create({ url: 'sidebar/welcome.html' });
    window.close();
  }
});

document.getElementById('openBtn').addEventListener('click', async () => {
  const [tab] = await chrome.tabs.query({active:true,currentWindow:true});
  if (tab) chrome.sidePanel.open({tabId:tab.id});
  window.close();
});

chrome.storage.local.get(['nexusTodos','nexusHabits','nexusSettings'], d => {
  const todos  = d.nexusTodos || [];
  const habits = d.nexusHabits || [];
  const settings = d.nexusSettings || {};
  const today = new Date().toDateString();
  document.getElementById('pTasks').textContent  = todos.filter(t=>!t.completed).length;
  document.getElementById('pHabits').textContent = `${habits.filter(h=>h.completedDates?.includes(today)).length}/${habits.length}`;
  document.getElementById('pFocus').textContent  = (settings.totalFocusMinutes||0)+'m';
});
</script>
</body>
</html>
